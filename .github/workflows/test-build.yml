# documentation: https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax
#
name: Test build NCC course material website
on:
  pull_request:
  push:
    branches-ignore:
      - main
      - production
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true
      - name: Read Python version
        id: pyversion
        run: echo "PYTHON_VERSION=$(cat .python)" >> $GITHUB_ENV
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '${{ env.PYTHON_VERSION }}'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pymarkdownlnt==0.9.36
      - name: Check ProperDocs YAML configuration
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: properdocs.yml
          config_file: config/yamllint.yml
        continue-on-error: false
      - name: Check Markdown syntax
        run: |
          pymarkdown \
            --config config/pymarkdown.yml --strict-config scan \
            --recurse docs \
            --exclude docs/courses/deprecated
        continue-on-error: false
  build:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true
          fetch-depth: 0
      - name: Read Python version
        id: pyversion
        run: echo "PYTHON_VERSION=$(cat .python)" >> $GITHUB_ENV
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '${{ env.PYTHON_VERSION }}'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --requirement requirements.txt
          properdocs --version
      - name: Build website
        run: properdocs build --strict
