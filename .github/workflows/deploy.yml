# documentation: https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax
#
name: Deploy NCC course material website
on:
  push:
    branches:
      - main
      - production
  workflow_dispatch:
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Read Python version
        id: pyversion
        run: echo "PYTHON_VERSION=$(cat .python)" >> $GITHUB_ENV
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '${{ env.PYTHON_VERSION }}'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --requirement requirements.txt
          properdocs --version
      - name: Check ProperDocs YAML configuration
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: properdocs.yml
          config_file: .yamllint.yml
        continue-on-error: false
      - name: Build and deploy website
        run: properdocs gh-deploy --strict
