# documentation: https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax
#
name: Deploy NCC course material website
on:
  push:
    branches:
      - main
      - production
  workflow_dispatch:
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Read Python version
        id: pyversion
        run: echo "PYTHON_VERSION=$(cat .python)" >> $GITHUB_ENV
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '${{ env.PYTHON_VERSION }}'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --requirement requirements.txt
          properdocs --version
      - name: Check ProperDocs YAML configuration
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: properdocs.yml
          config_file: .yamllint.yml
        continue-on-error: false
      - name: Build website
        run: properdocs build --strict
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
  report-build-status:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required for the telemetry endpoint
      #pages: write     # Required for some official Pages actions
      #id-token: write  # Required if using OIDC
    steps:
      - name: Report Build Status
        env:
          GH_TOKEN: ${{ github.token }}
          CONCLUSION: ${{ job.status }}
        run: |
          gh api -X POST "repos/$GITHUB_REPOSITORY/pages/telemetry" \
            -F github_run_id="$GITHUB_RUN_ID" \
            -F conclusion="$CONCLUSION"
